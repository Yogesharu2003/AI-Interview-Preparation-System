<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Python Interview Questions</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{

    background:#f4f6f9;

}

.container{

    width:85%;
    margin:40px auto;

}

.header{

    background:#2962ff;
    color:white;
    padding:25px;
    border-radius:10px;
    text-align:center;
    box-shadow:0 5px 12px rgba(0,0,0,.2);

}

.header h1{

    font-size:38px;

}

.header p{

    margin-top:10px;
    font-size:18px;

}

.question-box{

    background:white;
    margin-top:30px;
    border-radius:10px;
    padding:25px;
    box-shadow:0 5px 10px rgba(0,0,0,.1);

}

.question{

    background:#f8f9fa;
    padding:18px;
    margin-bottom:15px;
    border-left:6px solid #2962ff;
    border-radius:6px;
    font-size:20px;

}

.question span{

    font-weight:bold;
    color:#2962ff;

}

.button{

    display:inline-block;
    margin-top:25px;
    background:#28a745;
    color:white;
    text-decoration:none;
    padding:14px 28px;
    border-radius:8px;
    font-size:18px;
    font-weight:bold;

}

.button:hover{

    background:#218838;

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<h1>🐍 Python Interview Questions</h1>

<p>Practice the most frequently asked Python interview questions.</p>

</div>

<div class="question-box">

{% for question in questions %}

<div class="question">

<span>Q{{ loop.index }}.</span>

{{ question }}

</div>

{% endfor %}

<a href="/dashboard" class="button">

🏠 Back to Dashboard

</a>

</div>

</div>

</body>

</html>
