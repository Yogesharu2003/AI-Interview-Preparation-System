<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HR Interview Questions</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f4f6f9;
}

.container{
    width:85%;
    margin:40px auto;
}

.header{

    background:#6f42c1;
    color:white;
    padding:25px;
    border-radius:10px;
    text-align:center;
    box-shadow:0px 5px 15px rgba(0,0,0,.2);

}

.header h1{
    font-size:38px;
}

.header p{
    margin-top:10px;
    font-size:18px;
}

.question-box{

    background:white;
    margin-top:30px;
    padding:30px;
    border-radius:10px;
    box-shadow:0px 5px 10px rgba(0,0,0,.1);

}

.question{

    background:#f8f9fa;
    border-left:6px solid #6f42c1;
    padding:18px;
    margin-bottom:18px;
    border-radius:6px;
    font-size:20px;
    transition:.3s;

}

.question:hover{

    background:#f3e8ff;
    transform:translateX(8px);

}

.question span{

    color:#6f42c1;
    font-weight:bold;

}

.button{

    display:inline-block;
    margin-top:25px;
    padding:15px 30px;
    background:#28a745;
    color:white;
    text-decoration:none;
    border-radius:8px;
    font-size:18px;
    font-weight:bold;

}

.button:hover{

    background:#218838;

}

.mock{

    background:#6f42c1;
    margin-left:15px;

}

.mock:hover{

    background:#5a32a3;

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<h1>🎤 HR Interview Questions</h1>

<p>Practice the most common HR interview questions asked by companies.</p>

</div>

<div class="question-box">

{% for question in questions %}

<div class="question">

<span>Q{{ loop.index }}.</span>

{{ question }}

</div>

{% endfor %}

<a href="/dashboard" class="button">

🏠 Back to Dashboard

</a>

<a href="/interview" class="button mock">

🎤 Start Mock Interview

</a>

</div>

</div>

</body>
</html>
