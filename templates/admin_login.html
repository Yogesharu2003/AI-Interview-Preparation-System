<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f4f6f9;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .login-box{

            width:400px;
            background:white;
            padding:35px;
            border-radius:10px;
            box-shadow:0px 5px 15px rgba(0,0,0,0.2);

        }

        h1{

            text-align:center;
            color:#0d6efd;
            margin-bottom:10px;

        }

        p{

            text-align:center;
            color:gray;
            margin-bottom:25px;

        }

        label{

            font-weight:bold;

        }

        input{

            width:100%;
            padding:12px;
            margin-top:8px;
            margin-bottom:18px;
            border:1px solid #ccc;
            border-radius:6px;
            font-size:16px;

        }

        button{

            width:100%;
            padding:12px;
            border:none;
            background:#0d6efd;
            color:white;
            font-size:18px;
            border-radius:6px;
            cursor:pointer;

        }

        button:hover{

            background:#0b5ed7;

        }

        .error{

            background:#ffe5e5;
            color:red;
            padding:10px;
            border-radius:5px;
            margin-bottom:20px;
            text-align:center;

        }

        .back{

            display:block;
            text-align:center;
            margin-top:20px;
            text-decoration:none;
            color:#0d6efd;

        }

    </style>

</head>
<body>

<div class="login-box">

    <h1>🔐 Admin Login</h1>

    <p>AI Interview Preparation System</p>

    {% if error %}
    <div class="error">
        {{ error }}
    </div>
    {% endif %}

    <form method="POST">

		<label>Email</label>

		<input
			type="email"
			name="email"
			placeholder="Enter Admin Email"
			required
    >

    <label>Password</label>

    <input
        type="password"
        name="password"
        placeholder="Enter Password"
        required
    >

    <button type="submit">
        Login
    </button>

</form>

</body>
</html>
