<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Profile</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{

    background:#f4f6f9;

}

.container{

    width:500px;
    margin:60px auto;

}

.profile-card{

    background:white;
    border-radius:15px;
    box-shadow:0 8px 20px rgba(0,0,0,.15);
    overflow:hidden;

}

.header{

    background:#2962ff;
    color:white;
    padding:30px;
    text-align:center;

}

.avatar{

    width:100px;
    height:100px;
    border-radius:50%;
    background:white;
    color:#2962ff;
    font-size:55px;
    display:flex;
    align-items:center;
    justify-content:center;
    margin:auto;
    margin-bottom:15px;

}

.header h1{

    font-size:32px;

}

.content{

    padding:30px;

}

.info{

    display:flex;
    justify-content:space-between;
    margin-bottom:20px;
    padding:15px;
    border-radius:8px;
    background:#f8f9fa;

}

.label{

    font-weight:bold;
    color:#555;

}

.value{

    color:#2962ff;
    font-weight:bold;

}

.button{

    display:block;
    width:100%;
    text-align:center;
    margin-top:25px;
    background:#2962ff;
    color:white;
    padding:15px;
    text-decoration:none;
    border-radius:8px;
    font-size:18px;
    font-weight:bold;

}

.button:hover{

    background:#0039cb;

}

.logout{

    display:block;
    width:100%;
    text-align:center;
    margin-top:15px;
    background:#dc3545;
    color:white;
    padding:15px;
    text-decoration:none;
    border-radius:8px;
    font-size:18px;
    font-weight:bold;

}

.logout:hover{

    background:#bb2d3b;

}

</style>

</head>

<body>

<div class="container">

<div class="profile-card">

<div class="header">

<div class="avatar">

👤

</div>

<h1>{{ username }}</h1>

<p>AI Interview Preparation System</p>

</div>

<div class="content">

<div class="info">

<div class="label">
Full Name
</div>

<div class="value">
{{ username }}
</div>

</div>

<div class="info">

<div class="label">
Email
</div>

<div class="value">
{{ email }}
</div>

</div>

<a href="/dashboard" class="button">

🏠 Back to Dashboard

</a>

<a href="/logout" class="logout">

🚪 Logout

</a>

</div>

</div>

</div>

</body>
</html>
