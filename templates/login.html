<!DOCTYPE html>
<html>
<head>

    <title>AI Interview Preparation System - Login</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

    <style>

        body{
            margin:0;
            padding:0;
            background:#f4f6f9;
            font-family:Arial, Helvetica, sans-serif;
        }

        .login-container{

            width:450px;
            margin:60px auto;
            background:white;
            padding:35px;
            border-radius:12px;
            box-shadow:0px 5px 15px rgba(0,0,0,.2);

        }

        h1{

            text-align:center;
            color:#0d47a1;

        }

        h2{

            margin-top:25px;
            margin-bottom:20px;

        }

        input{

            width:100%;
            padding:14px;
            margin-top:12px;
            margin-bottom:18px;
            border:1px solid #ccc;
            border-radius:6px;
            font-size:16px;

        }

        button{

            width:100%;
            padding:14px;
            background:#2962ff;
            color:white;
            border:none;
            border-radius:6px;
            font-size:18px;
            cursor:pointer;

        }

        button:hover{

            background:#0039cb;

        }

        .error{

            background:#ffebee;
            color:red;
            padding:12px;
            border-radius:6px;
            margin-bottom:20px;
            text-align:center;

        }

        .success{

            background:#e8f5e9;
            color:green;
            padding:12px;
            border-radius:6px;
            margin-bottom:20px;
            text-align:center;

        }

        p{

            text-align:center;
            margin-top:20px;

        }

        a{

            color:#0d47a1;
            font-weight:bold;

        }

        .admin-note{

            margin-top:25px;
            text-align:center;
            color:#666;
            font-size:14px;

        }

    </style>

</head>

<body>

<div class="login-container">

<h1>🤖 AI Interview Preparation System</h1>

<h2>Login</h2>

{% if error %}
<div class="error">
    {{ error }}
</div>
{% endif %}

{% if success %}
<div class="success">
    {{ success }}
</div>
{% endif %}

<form action="/login" method="POST">

<input
type="email"
name="email"
placeholder="Enter Email"
required>

<input
type="password"
name="password"
placeholder="Enter Password"
required>

<button type="submit">

🔐 Login

</button>

</form>

<p>

Don't have an account?

<a href="/register">

Register

</a>

</p>

<div class="admin-note">

<b>Note:</b> Admin and User use the same login page.<br>

Admin Email:
<b>admin@gmail.com</b>

</div>


</div>

</body>
</html>
