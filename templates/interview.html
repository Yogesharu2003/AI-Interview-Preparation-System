<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Mock Interview</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{

    background:#f4f6f9;

}

.container{

    width:80%;
    max-width:900px;
    margin:50px auto;

}

.header{

    background:#2962ff;
    color:white;
    padding:25px;
    text-align:center;
    border-radius:12px;
    box-shadow:0px 8px 20px rgba(0,0,0,.15);

}

.header h1{

    font-size:40px;

}

.header p{

    margin-top:10px;
    font-size:20px;

}

.card{

    margin-top:30px;
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0px 5px 12px rgba(0,0,0,.15);

}

.question-count{

    display:inline-block;
    background:#2962ff;
    color:white;
    padding:8px 20px;
    border-radius:20px;
    font-size:18px;
    margin-bottom:20px;

}

.question{

    font-size:28px;
    font-weight:bold;
    color:#333;
    margin-bottom:25px;

}

textarea{

    width:100%;
    height:220px;
    border:2px solid #ddd;
    border-radius:8px;
    padding:15px;
    font-size:18px;
    resize:none;
    outline:none;

}

textarea:focus{

    border-color:#2962ff;

}

.submit-btn{

    width:100%;
    margin-top:25px;
    background:#28a745;
    color:white;
    border:none;
    padding:16px;
    font-size:20px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;

}

.submit-btn:hover{

    background:#218838;

}

.progress{

    margin-top:25px;
    background:#ddd;
    height:12px;
    border-radius:10px;
    overflow:hidden;

}

.bar{

    height:12px;
    background:#2962ff;
    width:{{ (number / total) * 100 }}%;

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<h1>🎤 AI Mock Interview</h1>

<p>Answer each question carefully. AI will evaluate your response.</p>

</div>

<div class="card">

<div class="question-count">

Question {{ number }} / {{ total }}

</div>

<div class="question">

{{ question }}

</div>

<form method="POST">

<textarea
name="answer"
placeholder="Type your answer here..."
required></textarea>

<button class="submit-btn">

🚀 Submit Answer

</button>

</form>

<div class="progress">

<div class="bar"></div>

</div>

</div>

</div>

</body>

</html>
