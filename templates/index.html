<!DOCTYPE html>
<html>
<head>

    <title>AI Interview Preparation System - Register</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

    <style>

        body{
            margin:0;
            padding:0;
            background:#f4f6f9;
            font-family:Arial, Helvetica, sans-serif;
        }

        .login-container{

            width:450px;
            margin:60px auto;
            background:white;
            padding:35px;
            border-radius:12px;
            box-shadow:0px 5px 15px rgba(0,0,0,.2);

        }

        h1{

            text-align:center;
            color:#0d47a1;

        }

        h2{

            margin-top:25px;
            margin-bottom:20px;
            text-align:center;
            color:#666;

        }

        input{

            width:100%;
            padding:14px;
            margin-top:12px;
            margin-bottom:18px;
            border:1px solid #ccc;
            border-radius:6px;
            font-size:16px;
            box-sizing:border-box;

        }

        button{

            width:100%;
            padding:14px;
            background:#2962ff;
            color:white;
            border:none;
            border-radius:6px;
            font-size:18px;
            cursor:pointer;

        }

        button:hover{

            background:#0039cb;

        }

        .error{

            background:#ffebee;
            color:red;
            padding:12px;
            border-radius:6px;
            margin-bottom:20px;
            text-align:center;

        }

        .success{

            background:#e8f5e9;
            color:green;
            padding:12px;
            border-radius:6px;
            margin-bottom:20px;
            text-align:center;

        }

        p{

            text-align:center;
            margin-top:20px;

        }

        a{

            color:#0d47a1;
            font-weight:bold;

        }

        .login-btn{

            display:block;
            width:100%;
            padding:14px;
            margin-top:10px;
            background:#2962ff;
            color:white;
            border:none;
            border-radius:6px;
            font-size:18px;
            text-align:center;
            text-decoration:none;
            box-sizing:border-box;
            cursor:pointer;

        }

        .login-btn:hover{

            background:#0039cb;

        }

        .back-home{

            display:block;
            text-align:center;
            margin-top:20px;
            color:#0d47a1;
            text-decoration:none;
            font-weight:bold;

        }

    </style>

</head>

<body>

<div class="login-container">

<h1>🤖 AI Interview Preparation System</h1>

<h2>Create Your Account</h2>

<form action="/register" method="POST">

<input
type="text"
name="full_name"
placeholder="Full Name"
required>

<input
type="email"
name="email"
placeholder="Email Address"
required>

<input
type="tel"
name="phone"
placeholder="Phone Number"
required>

<input
type="password"
name="password"
placeholder="Password"
required>

<button type="submit">

Register

</button>

</form>

<p>Already have an account?</p>

<a href="/login" class="login-btn">🔐 Login</a>

<a href="/" class="back-home">← Back to Home</a>

</div>

</body>
</html>
